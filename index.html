<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Happy Trace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --bg:     #0a0f1e;
  --surf:   #111827;
  --surf2:  #1e2a3a;
  --surf3:  #243043;
  --bord:   rgba(99,140,200,0.20);
  --bord2:  rgba(99,140,200,0.38);
  --text:   #dce8f5;
  --muted:  #6b8aac;
  --acc:    #7eb8f7;
  --acc2:   #4a90d9;
  --danger: #e05252;
  --r:      10px;
  --mono:   'DM Mono', monospace;
  --serif:  'Playfair Display', serif;
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  /* CLAVE: no poner touch-action en body */
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── Top bar ── */
#topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 14px;
  height: 54px;
  background: var(--surf);
  border-bottom: 1px solid var(--bord);
  flex-shrink: 0;
  gap: 10px;
  /* Los botones del topbar deben recibir touch sin problemas */
  touch-action: manipulation;
  position: relative;
  z-index: 10;
}

.logo {
  font-family: var(--serif);
  font-size: 18px;
  color: var(--acc);
  flex-shrink: 0;
}

.top-right {
  display: flex;
  gap: 6px;
  align-items: center;
  touch-action: manipulation;
}

/* ── Canvas ── */
#canvas-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: #fff;
  /* touch-action: none aquí para que el canvas capture el dibujo */
  touch-action: none;
}
#canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
}

/* ── Bottom bar ── */
#bottombar {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 8px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: var(--surf);
  border-top: 1px solid var(--bord);
  flex-shrink: 0;
  gap: 4px;
  /* CLAVE: touch-action manipulation para que los botones respondan */
  touch-action: manipulation;
  position: relative;
  z-index: 10;
}

/* ── Botones ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  border: 1.5px solid var(--bord2);
  border-radius: var(--r);
  background: var(--surf2);
  color: var(--text);
  font-family: var(--mono);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  white-space: nowrap;
  flex-shrink: 0;
  /* CLAVE para iOS: usar touchend en vez de click */
  touch-action: manipulation;
}
.btn:active, .btn.pressing { background: var(--surf3); transform: scale(0.92); }
.btn.active  { background: var(--acc2); border-color: var(--acc); color: #fff; }
.btn.save    { background: var(--acc2); border-color: var(--acc); color: #fff; }
.btn.danger  { border-color: var(--bord2); }
.btn.danger:active { background: rgba(224,82,82,0.2); border-color: var(--danger); color: var(--danger); }

.btn-icon { width: 44px; height: 44px; font-size: 20px; }
.btn-sm   { height: 36px; padding: 0 12px; font-size: 13px; }
.btn-top  { height: 36px; padding: 0 10px; font-size: 13px; }

/* ── Color button ── */
.color-wrap {
  position: relative;
  width: 44px; height: 44px;
  border-radius: var(--r);
  border: 1.5px solid var(--bord2);
  overflow: hidden;
  flex-shrink: 0;
  touch-action: manipulation;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.color-wrap input[type=color] {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  opacity: 0; cursor: pointer;
  border: none; padding: 0; margin: 0;
}
.color-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.35);
  pointer-events: none;
  flex-shrink: 0;
}

/* ── Panel slide-up ── */
#overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 40;
  touch-action: manipulation;
}
#overlay.open { display: block; }

#panel {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--surf);
  border-top: 1.5px solid var(--bord2);
  border-radius: 18px 18px 0 0;
  padding: 14px 16px;
  padding-bottom: calc(14px + env(safe-area-inset-bottom));
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
  touch-action: manipulation;
}
#panel.open { transform: translateY(0); }

.handle {
  width: 38px; height: 4px;
  background: var(--bord2);
  border-radius: 2px;
  margin: 0 auto 16px;
}

.psec { margin-bottom: 16px; }
.ptitle {
  font-size: 10px; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  margin-bottom: 10px;
}
.prow { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* Paleta */
.chip {
  width: 38px; height: 38px;
  border-radius: 8px;
  border: 2px solid rgba(255,255,255,0.08);
  cursor: pointer;
  flex-shrink: 0;
  touch-action: manipulation;
}
.chip:active { transform: scale(0.85); }
.chip.sel { border-color: #fff; box-shadow: 0 0 0 2px var(--acc); }

/* Sliders */
.srow { display: flex; align-items: center; gap: 10px; width: 100%; }
.srow label { font-size: 11px; color: var(--muted); min-width: 40px; }
.srow input[type=range] {
  flex: 1; -webkit-appearance: none;
  height: 6px; border-radius: 3px;
  background: var(--bord2); outline: none; cursor: pointer;
}
.srow input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--acc); border: 3px solid var(--bg); cursor: pointer;
}
.sval { font-size: 11px; color: var(--acc); min-width: 36px; text-align: right; }

/* Modos en panel */
.mgrid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.mbtn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; height: 62px;
  border: 1.5px solid var(--bord2);
  border-radius: var(--r);
  background: var(--surf2);
  color: var(--text); font-size: 22px;
  cursor: pointer;
  touch-action: manipulation;
}
.mbtn span { font-size: 9px; color: var(--muted); font-family: var(--mono); }
.mbtn:active { transform: scale(0.90); }
.mbtn.active { background: var(--acc2); border-color: var(--acc); }
.mbtn.active span { color: rgba(255,255,255,0.8); }

/* Fondo */
.bgwrap {
  display: flex; align-items: center; gap: 10px;
}
.bgbtn {
  width: 46px; height: 46px;
  border-radius: var(--r);
  border: 1.5px solid var(--bord2);
  position: relative; overflow: hidden;
  touch-action: manipulation; cursor: pointer;
}
.bgbtn input[type=color] {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  opacity: 0; cursor: pointer; border: none; padding: 0;
}
.bgprev { width: 100%; height: 100%; pointer-events: none; }

/* Toast */
#toast {
  position: fixed; bottom: 110px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surf2); border: 1px solid var(--bord2);
  border-radius: var(--r); padding: 8px 18px;
  font-size: 12px; color: var(--acc);
  opacity: 0; transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; z-index: 200; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Desktop */
@media (min-width: 768px) {
  #bottombar { display: none; }
  #desktop { display: flex !important; align-items: center; gap: 8px; flex: 1; overflow-x: auto; scrollbar-width: none; }
  #desktop::-webkit-scrollbar { display: none; }
  .sep { width: 1px; height: 24px; background: var(--bord2); flex-shrink: 0; }
  .dgrp { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
  .dlbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  .dslider { -webkit-appearance: none; height: 4px; border-radius: 2px; background: var(--bord2); outline: none; cursor: pointer; width: 80px; flex-shrink: 0; }
  .dslider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--acc); border: 2px solid var(--bg); cursor: pointer; }
  .dval { font-size: 11px; color: var(--acc); min-width: 32px; text-align: right; flex-shrink: 0; }
  .dspacer { flex: 1; }
}
</style>
</head>
<body>
<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <span class="logo">Happy Trace</span>

    <!-- Desktop toolbar (hidden mobile) -->
    <div id="desktop" style="display:none">
      <div class="sep"></div>
      <div class="dgrp">
        <span class="dlbl">Modo</span>
        <button class="btn btn-sm active" data-mode="pen">✏️ Pincel</button>
        <button class="btn btn-sm" data-mode="line">╱ Linea</button>
        <button class="btn btn-sm" data-mode="rect">▭ Rect</button>
        <button class="btn btn-sm" data-mode="circle">◯ Circulo</button>
        <button class="btn btn-sm" data-mode="fill">🪣 Relleno</button>
        <button class="btn btn-sm" data-mode="eraser">⬜ Goma</button>
        <button class="btn btn-sm" data-mode="eyedrop">💧 Color</button>
      </div>
      <div class="sep"></div>
      <div class="dgrp">
        <span class="dlbl">Color</span>
        <div class="color-wrap" style="width:34px;height:34px;">
          <div class="color-dot" id="dt-dot" style="width:20px;height:20px;background:#e05252;"></div>
          <input type="color" id="dt-color" value="#e05252">
        </div>
      </div>
      <div class="sep"></div>
      <div class="dgrp">
        <span class="dlbl">Trazo</span>
        <input type="range" class="dslider" id="dt-size" min="1" max="80" value="8">
        <span class="dval" id="dt-size-v">8px</span>
      </div>
      <div class="dgrp">
        <span class="dlbl">Opac.</span>
        <input type="range" class="dslider" id="dt-opacity" min="5" max="100" value="100">
        <span class="dval" id="dt-opacity-v">100%</span>
      </div>
      <div class="sep"></div>
      <div class="dgrp">
        <span class="dlbl">Fondo</span>
        <div class="bgbtn" style="width:34px;height:34px;">
          <div class="bgprev" id="dt-bg-prev" style="background:#fff;"></div>
          <input type="color" id="dt-bg" value="#ffffff">
        </div>
      </div>
      <div class="sep"></div>
      <div class="dgrp">
        <button class="btn btn-sm" id="dt-undo">↩ Deshacer</button>
        <button class="btn btn-sm danger" id="dt-clear">🗑 Limpiar</button>
      </div>
      <div class="dspacer"></div>
      <div class="dgrp">
        <button class="btn btn-sm save" id="dt-dl">⬇ Guardar PNG</button>
      </div>
    </div>

    <!-- Mobile: acciones arriba derecha -->
    <div class="top-right" id="mob-top">
      <button class="btn btn-top" id="mob-undo">↩</button>
      <button class="btn btn-top danger" id="mob-clear">🗑</button>
      <button class="btn btn-top save" id="mob-dl">⬇ PNG</button>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <!-- BOTTOM BAR (solo mobile) -->
  <div id="bottombar">
    <button class="btn btn-icon active" id="bb-pen"    data-mode="pen">✏️</button>
    <button class="btn btn-icon"        id="bb-line"   data-mode="line">╱</button>
    <button class="btn btn-icon"        id="bb-rect"   data-mode="rect">▭</button>
    <button class="btn btn-icon"        id="bb-circle" data-mode="circle">◯</button>
    <button class="btn btn-icon"        id="bb-fill"   data-mode="fill">🪣</button>
    <button class="btn btn-icon"        id="bb-eraser" data-mode="eraser">⬜</button>
    <div class="color-wrap" id="mob-color-wrap">
      <div class="color-dot" id="mob-dot" style="background:#e05252;"></div>
      <input type="color" id="mob-color" value="#e05252">
    </div>
    <button class="btn btn-icon" id="bb-more">⚙️</button>
  </div>

</div>

<!-- PANEL -->
<div id="overlay"></div>
<div id="panel">
  <div class="handle"></div>

  <div class="psec">
    <div class="ptitle">Colores rapidos</div>
    <div class="prow" id="palette"></div>
  </div>

  <div class="psec">
    <div class="ptitle">Tamano del trazo</div>
    <div class="srow">
      <label>Tamano</label>
      <input type="range" id="p-size" min="1" max="80" value="8">
      <span class="sval" id="p-size-v">8px</span>
    </div>
  </div>

  <div class="psec">
    <div class="ptitle">Opacidad</div>
    <div class="srow">
      <label>Opac.</label>
      <input type="range" id="p-opacity" min="5" max="100" value="100">
      <span class="sval" id="p-opacity-v">100%</span>
    </div>
  </div>

  <div class="psec">
    <div class="ptitle">Color de fondo</div>
    <div class="bgwrap">
      <div class="bgbtn">
        <div class="bgprev" id="p-bg-prev" style="background:#fff;"></div>
        <input type="color" id="p-bg" value="#ffffff">
      </div>
      <span style="font-size:12px;color:var(--muted);">Toca para cambiar el fondo</span>
    </div>
  </div>

  <div class="psec">
    <div class="ptitle">Herramientas</div>
    <div class="mgrid" id="panel-modes"></div>
  </div>
</div>

<div id="toast"></div>

<script>
(function() {
  'use strict';

  var canvas   = document.getElementById('canvas');
  var ctx      = canvas.getContext('2d');
  var wrap     = document.getElementById('canvas-wrap');
  var overlay  = document.getElementById('overlay');
  var panel    = document.getElementById('panel');
  var toast    = document.getElementById('toast');

  // Estado
  var W=0, H=0, color='#e05252', bgColor='#ffffff';
  var size=8, opacity=1, mode='pen';
  var isDown=false, startX=0, startY=0, snapshot=null;
  var history=[], MAX_HIST=50, toastTimer;
  var drawing = false; // flag para distinguir canvas de botones

  var PALETTE = ['#ffffff','#111827','#e05252','#e8874e','#f0c040','#4caf7d','#4a90d9','#7b6bd4','#d46bab','#6b8aac','#8B4513','#2d4a1e'];

  var MODES = [
    {id:'pen',    icon:'✏️', label:'Pincel'},
    {id:'line',   icon:'╱',  label:'Linea'},
    {id:'rect',   icon:'▭',  label:'Rect'},
    {id:'circle', icon:'◯',  label:'Elipse'},
    {id:'fill',   icon:'🪣', label:'Relleno'},
    {id:'eraser', icon:'⬜', label:'Goma'},
    {id:'eyedrop',icon:'💧', label:'Color'},
  ];

  // ── Paleta ──
  var palEl = document.getElementById('palette');
  PALETTE.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'chip' + (c===color?' sel':'');
    el.style.background = c;
    el.addEventListener('touchend', function(e) {
      e.preventDefault(); e.stopPropagation();
      setColor(c); closePanel();
    });
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      setColor(c); closePanel();
    });
    palEl.appendChild(el);
  });

  // ── Modos en panel ──
  var pmEl = document.getElementById('panel-modes');
  MODES.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'mbtn' + (m.id===mode?' active':'');
    btn.dataset.mode = m.id;
    btn.innerHTML = m.icon + '<span>' + m.label + '</span>';
    addTapHandler(btn, function() { setMode(m.id); closePanel(); });
    pmEl.appendChild(btn);
  });

  // ── Tap handler seguro para iOS ──
  // Usa touchend si disponible, fallback a click
  function addTapHandler(el, fn) {
    var moved = false;
    el.addEventListener('touchstart', function(e) {
      moved = false;
    }, {passive: true});
    el.addEventListener('touchmove', function(e) {
      moved = true;
    }, {passive: true});
    el.addEventListener('touchend', function(e) {
      if (!moved) {
        e.preventDefault();
        e.stopPropagation();
        fn();
      }
    });
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      fn();
    });
  }

  // ── Bottombar mode buttons ──
  ['pen','line','rect','circle','fill','eraser'].forEach(function(m) {
    var el = document.getElementById('bb-' + m);
    if (!el) return;
    addTapHandler(el, function() { setMode(m); });
  });

  // ── Mobile color picker ──
  var mobColor = document.getElementById('mob-color');
  mobColor.addEventListener('input', function(e) { setColor(e.target.value); });
  mobColor.addEventListener('change', function(e) { setColor(e.target.value); });

  // ── Panel open/close ──
  addTapHandler(document.getElementById('bb-more'), openPanel);
  addTapHandler(overlay, closePanel);

  function openPanel()  { panel.classList.add('open'); overlay.classList.add('open'); }
  function closePanel() { panel.classList.remove('open'); overlay.classList.remove('open'); }

  // ── Panel sliders ──
  document.getElementById('p-size').addEventListener('input', function(e) {
    size = +e.target.value;
    document.getElementById('p-size-v').textContent = size + 'px';
    syncDesktopSize();
  });
  document.getElementById('p-opacity').addEventListener('input', function(e) {
    opacity = +e.target.value / 100;
    document.getElementById('p-opacity-v').textContent = e.target.value + '%';
    syncDesktopOpacity(e.target.value);
  });
  document.getElementById('p-bg').addEventListener('input', function(e) {
    setBgColor(e.target.value);
  });

  // ── Desktop controls ──
  var dtColor = document.getElementById('dt-color');
  if (dtColor) { dtColor.addEventListener('input', function(e) { setColor(e.target.value); }); }

  var dtSize = document.getElementById('dt-size');
  if (dtSize) dtSize.addEventListener('input', function(e) {
    size = +e.target.value;
    document.getElementById('dt-size-v').textContent = size + 'px';
    document.getElementById('p-size').value = size;
    document.getElementById('p-size-v').textContent = size + 'px';
  });

  var dtOpacity = document.getElementById('dt-opacity');
  if (dtOpacity) dtOpacity.addEventListener('input', function(e) {
    opacity = +e.target.value / 100;
    document.getElementById('dt-opacity-v').textContent = e.target.value + '%';
    document.getElementById('p-opacity').value = e.target.value;
    document.getElementById('p-opacity-v').textContent = e.target.value + '%';
  });

  var dtBg = document.getElementById('dt-bg');
  if (dtBg) dtBg.addEventListener('input', function(e) { setBgColor(e.target.value); });

  document.querySelectorAll('[data-mode]').forEach(function(btn) {
    if (btn.closest('#desktop')) {
      btn.addEventListener('click', function() { setMode(btn.dataset.mode); });
    }
  });

  // Acciones
  ['mob-undo','dt-undo'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) addTapHandler(el, undo);
  });
  ['mob-clear','dt-clear'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) addTapHandler(el, function() { saveHistory(); fillBg(); showToast('Lienzo limpio'); });
  });
  ['mob-dl','dt-dl'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) addTapHandler(el, download);
  });

  // ── Funciones core ──
  function setColor(c) {
    color = c;
    var md = document.getElementById('mob-dot');
    if (md) md.style.background = c;
    var mc = document.getElementById('mob-color');
    if (mc) mc.value = c;
    var dd = document.getElementById('dt-dot');
    if (dd) dd.style.background = c;
    var dc = document.getElementById('dt-color');
    if (dc) dc.value = c;
    // chips
    document.querySelectorAll('.chip').forEach(function(ch) {
      ch.classList.toggle('sel', ch.style.background === c || rgbToHex(ch.style.background) === c);
    });
  }

  function rgbToHex(rgb) {
    var m = rgb.match(/(\d+),\s*(\d+),\s*(\d+)/);
    if (!m) return rgb;
    return '#' + [m[1],m[2],m[3]].map(function(v) { return (+v).toString(16).padStart(2,'0'); }).join('');
  }

  function setBgColor(c) {
    bgColor = c;
    document.getElementById('p-bg-prev').style.background = c;
    document.getElementById('p-bg').value = c;
    var dp = document.getElementById('dt-bg-prev');
    if (dp) { dp.style.background = c; document.getElementById('dt-bg').value = c; }
    fillBg();
  }

  function syncDesktopSize() {
    var ds = document.getElementById('dt-size'), dv = document.getElementById('dt-size-v');
    if (ds) { ds.value = size; dv.textContent = size + 'px'; }
  }
  function syncDesktopOpacity(v) {
    var ds = document.getElementById('dt-opacity'), dv = document.getElementById('dt-opacity-v');
    if (ds) { ds.value = v; dv.textContent = v + '%'; }
  }

  function setMode(m) {
    mode = m;
    // bottombar
    ['pen','line','rect','circle','fill','eraser'].forEach(function(k) {
      var el = document.getElementById('bb-' + k);
      if (el) el.classList.toggle('active', k === m);
    });
    // desktop
    document.querySelectorAll('[data-mode]').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.mode === m);
    });
    // panel
    document.querySelectorAll('.mbtn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.mode === m);
    });
    wrap.style.cursor = (m==='eyedrop'||m==='fill') ? 'cell' : 'crosshair';
  }

  function resize() {
    var snap = (canvas.width>0&&canvas.height>0) ? ctx.getImageData(0,0,canvas.width,canvas.height) : null;
    W = wrap.clientWidth; H = wrap.clientHeight;
    canvas.width=W; canvas.height=H;
    fillBg();
    if (snap) ctx.putImageData(snap, 0, 0);
  }

  function fillBg() {
    ctx.save(); ctx.globalAlpha=1; ctx.fillStyle=bgColor; ctx.fillRect(0,0,W,H); ctx.restore();
  }

  function saveHistory() {
    history.push(ctx.getImageData(0,0,W,H));
    if (history.length > MAX_HIST) history.shift();
  }

  function undo() {
    if (!history.length) { showToast('Nada que deshacer'); return; }
    ctx.putImageData(history.pop(), 0, 0);
    showToast('Deshacer (' + history.length + ')');
  }

  function download() {
    var a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'happy_trace_' + Date.now() + '.png';
    a.click();
    showToast('Guardado');
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 1800);
  }

  function applyStyle(erase) {
    ctx.globalAlpha = erase ? 1 : opacity;
    ctx.strokeStyle = erase ? bgColor : color;
    ctx.fillStyle   = erase ? bgColor : color;
    ctx.lineWidth   = size;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
  }

  function hexToRgb(hex) {
    var r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? [parseInt(r[1],16),parseInt(r[2],16),parseInt(r[3],16)] : [0,0,0];
  }

  function floodFill(px, py) {
    px=Math.round(px); py=Math.round(py);
    var img=ctx.getImageData(0,0,W,H), d=img.data;
    var i=(py*W+px)*4, tr=d[i],tg=d[i+1],tb=d[i+2],ta=d[i+3];
    var fc=hexToRgb(color);
    if (tr===fc[0]&&tg===fc[1]&&tb===fc[2]&&ta===255) return;
    var stack=[[px,py]], vis=new Uint8Array(W*H);
    while(stack.length) {
      var pt=stack.pop(), cx=pt[0], cy=pt[1];
      if (cx<0||cx>=W||cy<0||cy>=H) continue;
      if (vis[cy*W+cx]) continue;
      vis[cy*W+cx]=1;
      var j=(cy*W+cx)*4;
      if (Math.abs(d[j]-tr)>30||Math.abs(d[j+1]-tg)>30||Math.abs(d[j+2]-tb)>30||Math.abs(d[j+3]-ta)>30) continue;
      d[j]=fc[0];d[j+1]=fc[1];d[j+2]=fc[2];d[j+3]=255;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img,0,0);
  }

  function eyedrop(px,py) {
    var d=ctx.getImageData(Math.round(px),Math.round(py),1,1).data;
    var hex='#'+[d[0],d[1],d[2]].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
    setColor(hex); setMode('pen'); showToast('Color: '+hex);
  }

  function getPos(e) {
    var r=canvas.getBoundingClientRect(), sx=W/r.width, sy=H/r.height;
    var s=e.touches?e.touches[0]:e;
    return {x:(s.clientX-r.left)*sx, y:(s.clientY-r.top)*sy};
  }

  // ── EVENTOS CANVAS ──
  // Solo el canvas captura touch para dibujar
  // Los botones tienen sus propios handlers separados

  canvas.addEventListener('touchstart', function(e) {
    // Si el panel está abierto, ignorar
    if (panel.classList.contains('open')) return;
    e.preventDefault();
    var p = getPos(e);
    onDown(p);
  }, {passive: false});

  canvas.addEventListener('touchmove', function(e) {
    if (!isDown) return;
    e.preventDefault();
    var p = getPos(e);
    onMove(p);
  }, {passive: false});

  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    onUp();
  }, {passive: false});

  canvas.addEventListener('mousedown', function(e) {
    var p = getPos(e);
    onDown(p);
  });
  document.addEventListener('mousemove', function(e) {
    if (!isDown) return;
    var p = getPos(e);
    onMove(p);
  });
  document.addEventListener('mouseup', onUp);

  function onDown(p) {
    if (mode==='eyedrop') { eyedrop(p.x,p.y); return; }
    if (mode==='fill')    { saveHistory(); floodFill(p.x,p.y); return; }
    saveHistory();
    isDown=true; startX=p.x; startY=p.y;
    applyStyle(mode==='eraser');
    if (mode==='pen'||mode==='eraser') {
      ctx.beginPath(); ctx.arc(p.x,p.y,size/2,0,Math.PI*2); ctx.fill();
    } else {
      snapshot = ctx.getImageData(0,0,W,H);
    }
  }

  function onMove(p) {
    var erase = mode==='eraser';
    applyStyle(erase);
    if (mode==='pen'||erase) {
      ctx.beginPath(); ctx.moveTo(startX,startY); ctx.lineTo(p.x,p.y); ctx.stroke();
      ctx.beginPath(); ctx.arc(p.x,p.y,size/2,0,Math.PI*2); ctx.fill();
      startX=p.x; startY=p.y;
    } else {
      ctx.putImageData(snapshot,0,0);
      ctx.beginPath();
      if (mode==='line')   { ctx.moveTo(startX,startY); ctx.lineTo(p.x,p.y); ctx.stroke(); }
      else if (mode==='rect') { ctx.strokeRect(startX,startY,p.x-startX,p.y-startY); }
      else if (mode==='circle') {
        var rx=(p.x-startX)/2, ry=(p.y-startY)/2;
        ctx.ellipse(startX+rx,startY+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2); ctx.stroke();
      }
    }
  }

  function onUp() { isDown=false; snapshot=null; }

  // Teclado
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey||e.metaKey)&&e.key==='z') { e.preventDefault(); undo(); return; }
    var map={p:'pen',e:'eraser',l:'line',r:'rect',c:'circle',f:'fill',i:'eyedrop'};
    if (map[e.key]&&!e.ctrlKey&&!e.metaKey) setMode(map[e.key]);
    if (e.key==='[') { size=Math.max(1,size-2); document.getElementById('p-size').value=size; document.getElementById('p-size-v').textContent=size+'px'; syncDesktopSize(); }
    if (e.key===']') { size=Math.min(80,size+2); document.getElementById('p-size').value=size; document.getElementById('p-size-v').textContent=size+'px'; syncDesktopSize(); }
  });

  window.addEventListener('resize', resize);
  resize();
  setTimeout(resize, 100);
}());
</script>
</body>
</html>
